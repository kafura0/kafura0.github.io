name: Auto-Update Projects

on:
  # Run every day at 02:00 UTC
  schedule:
    - cron: "0 2 * * *"

  # Run whenever you push to main (picks up repo changes instantly)
  push:
    branches:
      - main

  # Allow a manual run from the Actions tab
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    # Skip if the commit was made by the bot itself (prevents infinite loops)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout portfolio repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch repos and update index.html
        env:
          GITHUB_TOKEN: ${{ secrets.PORTFOLIO_TOKEN }}
          GITHUB_USERNAME: kafura0
        run: python scripts/update_projects.py

      - name: Commit and push changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets/img/projects/
          # Only commit if there are staged changes
          git diff --staged --quiet || git commit -m "Auto-update projects [skip ci]"
          git push
